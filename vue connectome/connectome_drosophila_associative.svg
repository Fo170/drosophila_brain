<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 1400 1000" 
     width="1400" height="1000"
     style="background:#0a0e17; font-family:'Inter',system-ui,sans-serif;">
  <defs>
    <marker id="arrow-feedforward" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arrow-efferent" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.7"/>
    </marker>
    <marker id="arrow-recurrent" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f472b6" opacity="0.7"/>
    </marker>
    <marker id="arrow-commissure" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#06b6d4" opacity="0.7"/>
    </marker>
    <marker id="arrow-associative" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a78bfa" opacity="0.7"/>
    </marker>
    <marker id="arrow-afferent" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" opacity="0.7"/>
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- TITRE ET LEGENDE -->
  <text x="700.0" y="40" text-anchor="middle" 
        fill="#38bdf8" font-size="22" font-weight="700">
    Connectome Larve Drosophila melanogaster
  </text>
  <text x="700.0" y="65" text-anchor="middle" 
        fill="#64748b" font-size="13">
    Reseau associatif intra-cerebral · Winding et al. 2023 · 3 016 neurones · 548 000 synapses
  </text>
  <text x="30" y="100" fill="#e2e8f0" font-size="13" font-weight="600">Legende des faisceaux</text>
    <rect x="30" y="120" width="20" height="3" rx="1.5" fill="#f59e0b" opacity="0.8"/>
    <text x="58" y="123" fill="#94a3b8" font-size="11" dominant-baseline="middle">Sensoriel ↑</text>
    <rect x="30" y="142" width="20" height="3" rx="1.5" fill="#ef4444" opacity="0.8"/>
    <text x="58" y="145" fill="#94a3b8" font-size="11" dominant-baseline="middle">Moteur ↓</text>
    <rect x="30" y="164" width="20" height="3" rx="1.5" fill="#f472b6" opacity="0.8"/>
    <text x="58" y="167" fill="#94a3b8" font-size="11" dominant-baseline="middle">Recurrent ↻</text>
    <rect x="30" y="186" width="20" height="3" rx="1.5" fill="#06b6d4" opacity="0.8"/>
    <text x="58" y="189" fill="#94a3b8" font-size="11" dominant-baseline="middle">Commissure ↔</text>
    <rect x="30" y="208" width="20" height="3" rx="1.5" fill="#a78bfa" opacity="0.8"/>
    <text x="58" y="211" fill="#94a3b8" font-size="11" dominant-baseline="middle">Associatif ⟷</text>
    <rect x="30" y="230" width="20" height="3" rx="1.5" fill="#10b981" opacity="0.8"/>
    <text x="58" y="233" fill="#94a3b8" font-size="11" dominant-baseline="middle">Afferent ↑</text>
  <!-- CONNEXIONS INTER-REGIONS -->
    <path d="M476.8,432.8 Q697.5,357.4 923.2,416.0" 
          stroke="#a78bfa" stroke-width="7.9" 
          fill="none" opacity="0.85" marker-end="url(#arrow-associative)">
      <title>Lobe lateral (LH) -> Plaque supra-latérale (SLP): 22,400 synapses
Integration olfacto-visuelle. Decision comportementale multi-modale.</title>
    </path>
    <text x="700.0" y="424.4" 
          text-anchor="middle" dy="-5"
          fill="#94a3b8" font-size="10" font-family="monospace"
          opacity="0.8">22.4k</text>
    <path d="M476.8,432.8 Q584.8,433.2 675.2,374.0" 
          stroke="#a78bfa" stroke-width="5.5" 
          fill="none" opacity="0.75" marker-end="url(#arrow-associative)">
      <title>Lobe lateral (LH) -> Corps mushroom (MB): 15,800 synapses
Feedback LH -> mushroom body. Modulation de la valence olfactive.</title>
    </path>
    <text x="576.0" y="403.4" 
          text-anchor="middle" dy="-5"
          fill="#94a3b8" font-size="10" font-family="monospace"
          opacity="0.8">15.8k</text>
    <path d="M923.2,416.0 Q842.9,508.8 724.8,542.0" 
          stroke="#a78bfa" stroke-width="6.5" 
          fill="none" opacity="0.79" marker-end="url(#arrow-associative)">
      <title>Plaque supra-latérale (SLP) -> Plaque intermediaire (SIP): 18,600 synapses
Cortex associatif -> zone de transition. Flux sensoriel integre.</title>
    </path>
    <text x="824.0" y="479.0" 
          text-anchor="middle" dy="-5"
          fill="#94a3b8" font-size="10" font-family="monospace"
          opacity="0.8">18.6k</text>
    <path d="M724.8,542.0 Q621.6,570.6 551.2,651.2" 
          stroke="#a78bfa" stroke-width="5.0" 
          fill="none" opacity="0.72" marker-end="url(#arrow-associative)">
      <title>Plaque intermediaire (SIP) -> Crete cerebrale (CRE): 14,200 synapses
Relais vers centre moteur superieur. Planification d'actions.</title>
    </path>
    <path d="M724.8,542.0 Q803.2,578.0 848.8,651.2" 
          stroke="#a78bfa" stroke-width="4.5" 
          fill="none" opacity="0.70" marker-end="url(#arrow-associative)">
      <title>Plaque intermediaire (SIP) -> Plaque supra-mediane (SMP): 12,800 synapses
Modulation peptidergique de l'etat comportemental et motivationnel.</title>
    </path>
    <path d="M551.2,651.2 Q700.0,695.8 848.8,651.2" 
          stroke="#a78bfa" stroke-width="4.1" 
          fill="none" opacity="0.68" marker-end="url(#arrow-associative)">
      <title>Crete cerebrale (CRE) -> Plaque supra-mediane (SMP): 11,600 synapses
Coordination moteur-etat interne. Sequencement comportemental.</title>
    </path>
    <path d="M675.2,374.0 Q654.8,531.2 551.2,651.2" 
          stroke="#a78bfa" stroke-width="3.4" 
          fill="none" opacity="0.65" marker-end="url(#arrow-associative)">
      <title>Corps mushroom (MB) -> Crete cerebrale (CRE): 9,800 synapses
Mushroom body -> centre moteur. Memoire a action.</title>
    </path>
    <path d="M675.2,374.0 Q720.4,538.6 848.8,651.2" 
          stroke="#a78bfa" stroke-width="2.9" 
          fill="none" opacity="0.63" marker-end="url(#arrow-associative)">
      <title>Corps mushroom (MB) -> Plaque supra-mediane (SMP): 8,200 synapses
Modulation dopaminergique de l'etat interne par le MB.</title>
    </path>
  <!-- REGIONS FONCTIONNELLES -->
    <g transform="translate(390.0,264.8)">
      <circle r="23.6" fill="#f59e0b" opacity="0.12" />
      <circle r="13.0" fill="#f59e0b" opacity="0.5"/>
