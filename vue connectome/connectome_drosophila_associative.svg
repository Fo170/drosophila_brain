    </g>
    <g transform="translate(476.8,432.8)">
      <circle r="24.8" fill="#a78bfa" opacity="0.12" />
      <circle r="13.6" fill="#a78bfa" opacity="0.5"/>
      <circle r="5" fill="#a78bfa"/>
      <text y="42.8" text-anchor="middle" 
            fill="#e2e8f0" font-size="12" font-weight="600">LH</text>
      <text y="56.8" text-anchor="middle" 
            fill="#64748b" font-size="9">380N</text>
    </g>
    <g transform="translate(923.2,416.0)">
      <circle r="25.2" fill="#8b5cf6" opacity="0.12" />
      <circle r="13.9" fill="#8b5cf6" opacity="0.5"/>
      <circle r="5" fill="#8b5cf6"/>
      <text y="43.2" text-anchor="middle" 
            fill="#e2e8f0" font-size="12" font-weight="600">SLP</text>
      <text y="57.2" text-anchor="middle" 
            fill="#64748b" font-size="9">420N</text>
    </g>
    <g transform="translate(724.8,542.0)">
      <circle r="23.9" fill="#6366f1" opacity="0.12" />
      <circle r="13.2" fill="#6366f1" opacity="0.5"/>
      <circle r="5" fill="#6366f1"/>
      <text y="41.9" text-anchor="middle" 
            fill="#e2e8f0" font-size="12" font-weight="600">SIP</text>
      <text y="55.9" text-anchor="middle" 
            fill="#64748b" font-size="9">310N</text>
    </g>
    <g transform="translate(551.2,651.2)">
      <circle r="23.7" fill="#ec4899" opacity="0.12" />
      <circle r="13.0" fill="#ec4899" opacity="0.5"/>
      <circle r="5" fill="#ec4899"/>
      <text y="41.7" text-anchor="middle" 
            fill="#e2e8f0" font-size="12" font-weight="600">CRE</text>
      <text y="55.7" text-anchor="middle" 
