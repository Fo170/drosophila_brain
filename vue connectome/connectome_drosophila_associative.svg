  <!-- INFOBOX STATISTIQUES -->
  <rect x="1140" y="90" width="230" height="130" rx="12" 
        fill="#111827" stroke="#1e293b" stroke-width="1" opacity="0.95"/>
  <text x="1155" y="120" fill="#38bdf8" font-size="14" font-weight="700">
    Statistiques
  </text>
  <text x="1155" y="145" fill="#e2e8f0" font-size="12">
    Faisceaux affiches: <tspan fill="#f472b6" font-weight="700">8</tspan>
  </text>
  <text x="1155" y="165" fill="#e2e8f0" font-size="12">
    Synapses totales: <tspan fill="#f472b6" font-weight="700">113,400</tspan>
  </text>
  <text x="1155" y="185" fill="#94a3b8" font-size="10">
    Epaisseur ∝ nombre de synapses
  </text>
  <text x="1155" y="205" fill="#94a3b8" font-size="10">
    1 trait = agregation inter-regions
  </text>
</svg>