    </g>
    <g transform="translate(675.2,374.0)">
      <circle r="23.1" fill="#f472b6" opacity="0.12" />
      <circle r="12.7" fill="#f472b6" opacity="0.5"/>
      <circle r="5" fill="#f472b6"/>
      <text y="41.1" text-anchor="middle" 
            fill="#e2e8f0" font-size="12" font-weight="600">MB</text>
      <text y="55.1" text-anchor="middle" 
